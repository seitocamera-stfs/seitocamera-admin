version: '3.8'

services:
  # ===========================================
  # PostgreSQL
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: seitocamera-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-seitocamera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seitocamera_dev_2024}
      POSTGRES_DB: ${DB_NAME:-seitocamera_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seitocamera"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: seitocamera-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Backend (Node.js + Express + Prisma)
  # ===========================================
  backend:
    build: ./backend
    container_name: seitocamera-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-seitocamera}:${DB_PASSWORD:-seitocamera_dev_2024}@postgres:5432/${DB_NAME:-seitocamera_admin}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-canvia-aquest-secret-en-produccio}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      APP_URL: ${APP_URL:-https://admin.seito.camera}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

  # ===========================================
  # Frontend (React + Vite, servit per Nginx)
  # ===========================================
  frontend:
    build: ./frontend
    container_name: seitocamera-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ===========================================
  # Nginx (reverse proxy)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: seitocamera-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
