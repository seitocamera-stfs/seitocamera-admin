services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: seito
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: marketing
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seito -d marketing"]
      interval: 5s
      timeout: 3s
      retries: 10
