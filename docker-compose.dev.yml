version: '3.8'

# Només PostgreSQL i Redis per desenvolupament local
# Backend i Frontend s'executen amb npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: seitocamera-db-dev
    environment:
      POSTGRES_USER: seitocamera
      POSTGRES_PASSWORD: seitocamera_dev_2024
      POSTGRES_DB: seitocamera_admin
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seitocamera"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seitocamera-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
