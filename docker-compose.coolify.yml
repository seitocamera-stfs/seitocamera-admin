version: '3.8'

# ===========================================
# SeitoCamera Admin — Producció (Coolify/Traefik)
# ===========================================
# Desplegat via Coolify. Traefik gestiona SSL i routing.
# ===========================================

services:
  # ===========================================
  # PostgreSQL — Només xarxa interna
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: seitocamera-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis — AMB password, només xarxa interna
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: seitocamera-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Backend (Node.js + Express + Prisma)
  # ===========================================
  backend:
    image: ghcr.io/seitocamera-stfs/seitocamera-admin/backend:latest
    container_name: seitocamera-backend
    restart: unless-stopped
    env_file:
      - /opt/seitocamera/backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - uploads_data:/app/uploads
      - /opt/seitocamera/google-service-account.json:/app/google-service-account.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================
  # Frontend (React + Vite → Nginx static)
  # ===========================================
  frontend:
    image: ghcr.io/seitocamera-stfs/seitocamera-admin/frontend:latest
    container_name: seitocamera-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ===========================================
  # Nginx (reverse proxy intern — Traefik gestiona SSL)
  # ===========================================
  nginx:
    image: ghcr.io/seitocamera-stfs/seitocamera-admin/nginx:latest
    container_name: seitocamera-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - coolify
    # IMPORTANT: NO posar healthcheck aquí — Traefik filtra containers "unhealthy"
    # i deixa de fer routing, causant Gateway Timeout
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.seitocamera.rule=Host(`admin.seito.camera`)"
      - "traefik.http.routers.seitocamera.entrypoints=https"
      - "traefik.http.routers.seitocamera.tls=true"
      - "traefik.http.routers.seitocamera.tls.certresolver=letsencrypt"
      - "traefik.http.services.seitocamera.loadbalancer.server.port=80"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.seitocamera-http.rule=Host(`admin.seito.camera`)"
      - "traefik.http.routers.seitocamera-http.entrypoints=http"
      - "traefik.http.routers.seitocamera-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  internal:
    driver: bridge
  coolify:
    external: true
    name: coolify

volumes:
  postgres_data:
  redis_data:
  uploads_data:
